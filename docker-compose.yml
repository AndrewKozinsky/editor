version: "3.9"

services:

  # API редактора
  editor_api:
    build: ./editorApi
    command: npm run start
    restart: unless-stopped
    container_name: editor-api
    environment:
      - MODE=production
      - PORT=3001
      - MONGO_URL=mongodb://editor_db:27017/editor_db
    depends_on:
      - editor_db
    networks:
      - editorium-network

  # БД редактора
  editor_db:
    image: mongo:latest
    container_name: editor-db
    volumes:
      - editor_db:/data/db
    networks:
      - editorium-network

  # Клиентская часть редактора
  editor:
    build:
      context: ./editor
      dockerfile: Dockerfile.prod
    container_name: editor
    command: serve -s build -l 3000
    restart: unless-stopped
    networks:
      - editorium-network

  # Nginx
  nginx:
    image: nginx:stable-alpine
    container_name: editor-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf.prod:/etc/nginx/conf.d/nginx.conf
    depends_on:
      - editor_api
      - editor
    networks:
      - editorium-network

volumes:
  editor_db:

networks:
  editorium-network:
    driver: bridge