version: "3.3"

services:
  # Nginx
  nginx:
    image: nginx:1.19.7-alpine
    container_name: editor-nginx
    depends_on:
      - editor
#      - nest_api
#      - postgres_db
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf.dev:/etc/nginx/nginx.conf

  # Клиентская часть редактора
  editor:
    build:
      context: ./editor
      dockerfile: Dockerfile.dev
    container_name: editor-editor
    command: npm run dev
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - ./editor/src:/app/src

