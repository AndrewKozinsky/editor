version: "3.9"

services:

  # Nginx
  nginx:
    build: ./nginx
    container_name: editor-nginx
    depends_on:
      - editor
#      - express_api
#      - mongo_db
      - nest_api
      - postgres_db
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf.dev:/etc/nginx/nginx.conf
    networks:
      - editorium-network


  # Клиентская часть редактора
  editor:
    build:
      context: ./editor
      dockerfile: Dockerfile.dev
    container_name: editor-editor
    command: npm run dev
    environment:
      - SITE_URL=editorium.local
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - ./editor/src:/app/src
    networks:
      - editorium-network


  # API редактора (Express)
#  express_api:
#    build: ./expressApi
#    container_name: express-api
#    command: npm run dev
#    restart: unless-stopped
#    environment:
#      - MODE=development
#      - PORT=3001
#      - MONGO_URL=mongodb://mongo_db:27017/mongo_db
#    depends_on:
#      - mongo_db
#    networks:
#      - editorium-network
#    volumes:
#      - ./expressApi/src:/app/src

  # Mongo
#  mongo_db:
#    image: mongo:latest
#    container_name: mongo_db
#    restart: always
#    ports:
#      - 27017:27017
#    volumes:
#      - mongo_db:/data/db
#    networks:
#      - editorium-network


  # API редактора (Nest)
  nest_api:
    build: ./nestApi
    container_name: nest-api
    command: npm run start:dev
    restart: unless-stopped
    networks:
      - editorium-network
    volumes:
      - ./nestApi/src:/app/src

  # Postgres
  postgres_db:
    image: postgres:13-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_PASSWORD: 123
      POSTGRES_USER: postgres
      POSTGRES_DB: editor
    volumes:
      - postgres_db:/data/db
    networks:
      - editorium-network


volumes:
  mongo_db:
  postgres_db:

networks:
  editorium-network:
    driver: bridge