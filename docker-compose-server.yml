version: "3.3"

services:
  # Nginx
  nginx:
    image: nginx:1.19.7-alpine
    container_name: editor-nginx
    environment:
      - VIRTUAL_HOST=editorium.net
      - LETSENCRYPT_HOST=editorium.net
    depends_on:
      - editor
      - nest
      - postgres
      - next
      - staticFileServer
    volumes:
      - ./nginx/nginx.conf.server:/etc/nginx/nginx.conf

  # Клиентская часть редактора
  editor:
    image: editor-editor
    container_name: editor-editor
    command: serve /app/dist -l 3000
    restart: unless-stopped

  # API редактора (Nest)
  nest:
    image: editor-nest
    container_name: editor-nest
    command: npm run start:prod
    restart: unless-stopped
    environment:
      - MODE=production
      - PORT=3002
    depends_on:
      - postgres

  # Postgres
  # BD: editor
  # User: editor
  # Password: dt52posQP00P
  postgres:
    image: postgres:13-alpine
    container_name: editor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: sguen35GPA
      POSTGRES_USER: postgres
      POSTGRES_DB: editor
    volumes:
      - postgres:/var/lib/postgresql/data

  # Сайт про редактор (Next)
  next:
    image: editor-next
    container_name: editor-next
    command: npm run start
    restart: unless-stopped

  # Хранилище файлов
  staticFileServer:
    image: halverneus/static-file-server
    environment:
      PORT: 4000
      FOLDER: /staticFileServer
    volumes:
      - ./staticFileServer:/staticFileServer
    restart: unless-stopped


volumes:
  postgres:

networks:
  default:
    external:
      name: nginx-proxy